api_platform:
    title: 'RecipeHub API'
    description: 'RecipeHub API - Professional Recipe Sharing Platform'
    version: '1.0.0'
    docs_formats:
        jsonld: ['application/ld+json']
        jsonhal: ['application/hal+json']
        openapi: ['application/vnd.openapi+json']
    formats:
        jsonld:
            mime_types: ['application/ld+json']
        json: 
            mime_types: ['application/json']
        jsonhal:
            mime_types: ['application/hal+json']
        openapi:
            mime_types: ['application/vnd.openapi+json', 'application/openapi+json']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        pagination:
            items_per_page: 10
            maximum_items_per_page: 100
            page_parameter_name: 'page'
            enabled_parameter_name: 'pagination'
            count_parameter_name: 'itemsPerPage'
    exception_to_status:
        Symfony\Component\Serializer\Exception\ExceptionInterface: 400
        ApiPlatform\Exception\InvalidArgumentException: 400
